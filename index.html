<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍿 Movie Search</h1>
            <p>Search through thousands of movies</p>
        </header>

        <div class="search-section">
            <div class="search-input-wrapper">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search for a movie..." 
                    autocomplete="off"
                >
                <button type="button" onclick="search()">Search</button>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label for="genreFilter">Genre:</label>
                    <select id="genreFilter" onchange="search()">
                        <option value="">All Genres</option>
                        <option value="Action">Action</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Drama">Drama</option>
                        <option value="Horror">Horror</option>
                        <option value="Romance">Romance</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Thriller">Thriller</option>
                        <option value="Animation">Animation</option>
                        <option value="Adventure">Adventure</option>
                        <option value="Fantasy">Fantasy</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="yearFilter">Year Released:</label>
                    <select id="yearFilter" onchange="search()">
                        <option value="">All Years</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                        <option value="2021">2021</option>
                        <option value="2020">2020</option>
                        <option value="2010-2019">2010 - 2019</option>
                        <option value="2000-2009">2000 - 2009</option>
                        <option value="1990-1999">1990 - 1999</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div id="resultsContainer" class="results-container">
            <div class="no-results">Enter a search query or select filters to find movies.</div>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
